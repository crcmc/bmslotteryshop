<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="gold" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="45%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#c48f09"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4fae4f"/>
      <stop offset="1" stop-color="#1f7a1f"/>
    </linearGradient>
  </defs>

  <!-- 둥근 사각형 배경 -->
  <rect width="512" height="512" rx="110" fill="url(#gold)"/>

  <!-- 내부 은은한 테두리 -->
  <rect x="14" y="14" width="484" height="484" rx="96" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2"/>

  <!-- 네잎클로버 -->
  <g transform="translate(256 238)">
    <g fill="url(#leafGrad)">
      <!-- 상단 잎 -->
      <path d="M0,-10 C-50,-60 -115,-40 -100,15 C-90,50 -40,50 -10,20 C-5,15 0,5 0,-10 Z" transform="rotate(45)"/>
      <!-- 우측 잎 -->
      <path d="M0,-10 C-50,-60 -115,-40 -100,15 C-90,50 -40,50 -10,20 C-5,15 0,5 0,-10 Z" transform="rotate(135)"/>
      <!-- 하단 잎 -->
      <path d="M0,-10 C-50,-60 -115,-40 -100,15 C-90,50 -40,50 -10,20 C-5,15 0,5 0,-10 Z" transform="rotate(225)"/>
      <!-- 좌측 잎 -->
      <path d="M0,-10 C-50,-60 -115,-40 -100,15 C-90,50 -40,50 -10,20 C-5,15 0,5 0,-10 Z" transform="rotate(315)"/>
    </g>
    <!-- 중앙 원 -->
    <circle r="14" fill="#144d14"/>
    <!-- 줄기 -->
    <path d="M0 12 Q14 90 -8 170" stroke="#1f7a1f" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>
</svg>
